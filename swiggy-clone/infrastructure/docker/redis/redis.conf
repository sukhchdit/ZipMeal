# ═══════════════════════════════════════════════════════════════════
# Swiggy Clone — Redis Configuration
# ═══════════════════════════════════════════════════════════════════
# Tuned for a local development environment that mirrors the caching
# and pub/sub patterns used in production (carts, sessions, OTPs,
# rate-limiting, real-time delivery location updates).
# ═══════════════════════════════════════════════════════════════════

# ── Memory Management ────────────────────────────────────────────
# Cap memory at 256 MB.  When the limit is reached, evict the least
# recently used key across ALL databases — acceptable for a cache
# layer where every key has an implicit or explicit TTL.
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence (AOF) ───────────────────────────────────────────
# Append-only file gives us crash-resilient durability for active
# cart and dine-in session data without the latency cost of fsync
# on every write.  "everysec" is the recommended trade-off between
# durability and performance.
appendonly yes
appendfsync everysec

# ── Network ──────────────────────────────────────────────────────
# Send TCP keep-alive probes every 300 seconds so that idle
# connections behind NAT / load-balancers are not silently dropped.
tcp-keepalive 300

# ── Logging ──────────────────────────────────────────────────────
# "notice" is the default; keeps logs informative without flooding
# stdout inside the container.
loglevel notice
