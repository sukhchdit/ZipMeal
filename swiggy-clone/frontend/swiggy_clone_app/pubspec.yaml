name: swiggy_clone_app
description: Enterprise Swiggy Clone - Food Delivery & Dine-In Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  signalr_netcore: ^1.3.7
  connectivity_plus: ^6.1.1

  # Code Generation Annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # UI Components
  lottie: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0

  # Charts
  fl_chart: ^0.69.0

  # QR Code
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

