# ═══════════════════════════════════════════════════════════════════
# Swiggy Clone — Nginx Reverse-Proxy Configuration
# ═══════════════════════════════════════════════════════════════════
# Routes HTTP traffic to the ASP.NET Core API backend and handles:
#   - /api/*  → REST endpoints
#   - /ws/*   → WebSocket connections (SignalR for real-time tracking)
#   - CORS headers for local front-end development
#   - A lightweight /health endpoint for container orchestration
# ═══════════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # ── Logging ──────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Upstream ─────────────────────────────────────────────────
    # Points to the API container's internal port (Kestrel on 8080).
    upstream api_backend {
        server api:8080;
    }

    # ── Server (HTTP — port 80) ──────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── CORS (development only) ─────────────────────────────
        # Allow the React / Next.js front-end running on a different
        # port to call the API without being blocked by the browser.
        add_header 'Access-Control-Allow-Origin'      '*' always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age'           '86400' always;

        # Preflight requests — return 204 immediately.
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── Health check endpoint ────────────────────────────────
        # Returns a quick 200 OK without hitting the upstream.  Used
        # by Docker health-checks and container orchestrators.
        location = /health {
            access_log off;
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # ── REST API ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Standard proxy headers so the API sees the real client
            # IP and protocol even though it sits behind Nginx.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;

            # Timeouts — generous for long-running API calls.
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer settings for JSON payloads.
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      4 32k;
        }

        # ── WebSocket (SignalR) ──────────────────────────────────
        # Real-time delivery tracking, dine-in order updates, and
        # push notifications use SignalR over WebSockets.
        location /ws/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Upgrade the connection from HTTP to WebSocket.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections are long-lived; extend timeouts.
            proxy_connect_timeout 7d;
            proxy_send_timeout    7d;
            proxy_read_timeout    7d;
        }

        # ── Default — catch-all ──────────────────────────────────
        # In a full deployment this would serve the SPA front-end
        # assets.  For now, return 404 for anything that is not
        # /api, /ws, or /health.
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
