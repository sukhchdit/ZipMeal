# =============================================================================
# Production Environment Overrides
# =============================================================================

replicaCount: 3

image:
  repository: ""  # Set via CI/CD

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  maxUnavailable: 1

config:
  ASPNETCORE_ENVIRONMENT: "Production"
  Serilog__MinimumLevel__Default: "Information"
  FeatureFlags__EnableSwagger: "false"

externalSecrets:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: swiggy-clone-secrets
  data:
    - secretKey: ConnectionStrings__DefaultConnection
      remoteRef:
        key: swiggy-clone/prod/database
        property: connection_string
    - secretKey: ConnectionStrings__Redis
      remoteRef:
        key: swiggy-clone/prod/redis
        property: connection_string
    - secretKey: Jwt__Secret
      remoteRef:
        key: swiggy-clone/prod/jwt
        property: secret

ingress:
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: ""  # Set to actual ACM cert ARN
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400
  hosts:
    - host: api.swiggy-clone.example.com
      paths:
        - path: /
          pathType: Prefix
