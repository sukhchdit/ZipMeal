groups:
  - name: swiggyclone-alerts
    rules:
      # P1 — High error rate (>5% of requests returning 5xx over 5 minutes)
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "High API error rate detected"
          description: "More than 5% of HTTP requests are returning 5xx errors over the last 5 minutes."

      # P2 — High P99 latency (>2s over 10 minutes)
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket[10m])) by (le))
          > 2.0
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "High P99 latency detected"
          description: "The 99th percentile request latency exceeds 2 seconds over the last 10 minutes."

      # P1 — High payment failure rate (>10% over 15 minutes)
      - alert: HighPaymentFailureRate
        expr: |
          (
            sum(rate(swiggyclone_payments_failed_total[15m]))
            /
            (sum(rate(swiggyclone_payments_completed_total[15m])) + sum(rate(swiggyclone_payments_failed_total[15m])))
          ) > 0.10
        for: 15m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "High payment failure rate"
          description: "More than 10% of payment verifications are failing over the last 15 minutes."

      # P2 — Kafka consumer lag high (placeholder — requires Kafka exporter)
      - alert: KafkaConsumerLagHigh
        expr: |
          sum(kafka_consumer_group_lag) by (consumergroup) > 10000
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumergroup }} has a lag exceeding 10,000 messages."
