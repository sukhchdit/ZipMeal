apiVersion: v1
kind: Service
metadata:
  name: {{ include "swiggy-clone.fullname" . }}
  labels:
    {{- include "swiggy-clone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "swiggy-clone.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
